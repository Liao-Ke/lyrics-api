name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov --cov-fail-under=80

  build-smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t lyrics-api-ci .
      - name: Start container
        run: docker run -d -p 8000:8000 --name ci lyrics-api-ci
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timeout — container logs:"
          docker logs ci 2>/dev/null || true
          exit 1
      - name: Smoke test — healthz
        run: curl -sf http://localhost:8000/healthz | grep -q '"status":"ok"'
      - name: Smoke test — landing page
        run: curl -fso /dev/null http://localhost:8000/
      - name: Cleanup
        if: always()
        run: docker stop ci 2>/dev/null || true; docker rm ci 2>/dev/null || true